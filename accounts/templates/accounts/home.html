<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h2>Welcome to Study Buddy!</h2>
    {% if user.is_authenticated %}
        <p>Hello, {{ user.username }}! You are logged in.</p>
        <p><a href="{% url 'logout' %}">Logout</a></p>
    {% else %}
        <p><a href="{% url 'accounts:signup' %}">Sign Up</a> | <a href="{% url 'login' %}">Login</a></p>
    {% endif %}
</body>
</html>
