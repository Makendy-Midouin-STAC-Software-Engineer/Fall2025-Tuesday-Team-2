<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login to Your Account</h2>

    <!-- Display login errors -->
    {% if form.errors %}
        <div style="color: red;">
            <p>Your username and password didn’t match. Please try again.</p>
        </div>
    {% endif %}

    <!-- Login form -->
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <p>Don’t have an account? <a href="{% url 'signup' %}">Sign up here</a>.</p>
</body>
</html>
